<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Expense Tracker</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
  h1 { font-size: 1.4rem; }
  form { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  input { padding: 6px 8px; }
  input[name="amount"] { width: 90px; }
  input[name="category"] { width: 120px; }
  input[name="description"] { flex: 1; min-width: 150px; }
  button { padding: 6px 14px; cursor: pointer; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; }
  th, td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #ddd; font-size: 0.9rem; }
  #summary { margin-top: 20px; font-size: 0.9rem; color: #333; }
  .del { color: #c0392b; cursor: pointer; background: none; border: none; }
</style>
</head>
<body>
  <h1>💰 Expense Tracker</h1>
  <form id="add-form">
    <input name="amount" type="number" step="0.01" placeholder="Amount" required />
    <input name="category" type="text" placeholder="Category" />
    <input name="description" type="text" placeholder="Description" />
    <button type="submit">Add</button>
  </form>

  <table>
    <thead><tr><th>Date</th><th>Amount</th><th>Category</th><th>Description</th><th></th></tr></thead>
    <tbody id="rows"></tbody>
  </table>

  <div id="summary"></div>

<script>
async function load() {
  const [expenses, summary] = await Promise.all([
    fetch('/api/expenses').then(r => r.json()),
    fetch('/api/summary').then(r => r.json())
  ]);

  const rows = document.getElementById('rows');
  rows.innerHTML = expenses.map(e => `
    <tr>
      <td>${e.date}</td>
      <td>₹${e.amount.toFixed(2)}</td>
      <td>${e.category}</td>
      <td>${e.description}</td>
      <td><button class="del" data-id="${e.id}">✕</button></td>
    </tr>
  `).join('');

  document.getElementById('summary').innerHTML =
    `<strong>Total: ₹${summary.total.toFixed(2)}</strong><br/>` +
    Object.entries(summary.byCategory).map(([c, a]) => `${c}: ₹${a.toFixed(2)}`).join(' &nbsp;|&nbsp; ');

  document.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', async () => {
      await fetch('/api/expenses/' + btn.dataset.id, { method: 'DELETE' });
      load();
    });
  });
}

document.getElementById('add-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const form = new FormData(e.target);
  await fetch('/api/expenses', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      amount: form.get('amount'),
      category: form.get('category'),
      description: form.get('description')
    })
  });
  e.target.reset();
  load();
});

load();
</script>
</body>
</html>
